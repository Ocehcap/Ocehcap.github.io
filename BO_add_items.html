<body class="d-flex flex-column">
  <main class="flex-shrink-0">
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="collapse navbar-collapse" id="navbarSupportedContent"></div>
      <div class="header container-fluid px-5 d-flex justify-content-end mt-auto"
        style="position: fixed; top: 0; background-image: url('./images/IMG_4412.png');">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <img class="img-fluid rounded-3 my-2.5" src="images\logo_sem_fundo.png" style="width: 30px; height: auto;">

          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link text-white" href="index.html">MAGPIE NEST</a></li>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link text-white" href="about.html">About us</a></li>
            <li id="TradeFeed" class="nav-item"><a class="nav-link text-white" href="faq.html">Feed</a></li>
            <li id="TradeNav" class="nav-item"><a class="nav-link text-white" href="make_trade.html">Trading Room</a>
            </li>
            <li id="PermAdmin" class="nav-item"><a class="nav-link text-white" href="BO_trade_list.html">BO Trade
                List</a></li>
            <li id="PermAdmin1" class="nav-item"><a class="nav-link text-white" href="BO_add_items.html">BO Sneaker</a>
            </li>
            <li class="nav-item">

            </li>
          </ul>
          <a href="profile.html">
            <i id="iconPerf" class="bi bi-person-fill text-white"></i>
          </a>
          <button id="logoutButton" onclick="removerItem()">Logout</button>
        </div>
      </div>
    </nav>

    <!-- Page content-->
    <div id="listaSneakers" style="margin-bottom: 210px;">
      <section class="py-5">
        <div class="container px-5">
          <div class="text-center mb-5">
            <h2 class="fw-bolder">Sneakers List</h2>
          </div>
          <div class="row">
            <div class="col-3">
              <label for="textoAdicionar">Search:</label>
              <input id="textoAdicionar" class="form-control" v-model="searchTerm" placeholder="Enter a sneaker name">
            </div>
            <div class="col-2">
              <button id="adicionar" class="btn btn-filtrar-white float-right" @click="addSneaker">Add</button>
            </div>
          </div>
          <div class="row mt-5">
            <div class="col-12">
              <ul class="list-group">
                <li v-for="(sneaker, index) in filteredSneakers" :key="index"
                  class="list-group-item d-flex justify-content-between align-items-center">
                  {{ sneaker.name }}
                  <button class="btn btn-danger" @click="removeSneaker(index)">Remove</button>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </section>
    </div>
    <!-- Footer-->
    <footer class="bg-dark py-0 mt-auto"></footer>
    <div class="mr-4">
      <img src="./images/Footer.jpg" alt="footer Image" style="width:100%; height:auto;">
    </div>
    </footer>
    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
