<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description" content="" />
  <meta name="author" content="" />
  <title>Feed | Magpie Nest</title>
  <!-- Favicon-->
  <link rel="icon" type="image/x-icon" href="images/magpielogo.png" />
  <!-- Bootstrap icons-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Core theme CSS (includes Bootstrap)-->
  <link href="css/styles.css" rel="stylesheet" />

<body class="d-flex flex-column h-100">
  <main class="flex-shrink-0">
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="collapse navbar-collapse" id="navbarSupportedContent"></div>
      <div class="header container-fluid px-5 d-flex justify-content-end mt-auto" style="position: fixed; top: 0; background-image: url('./images/IMG_4412.png'); z-index: 1000;">
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <img class="img-fluid rounded-3 my-2.5" src="images\logo_sem_fundo.png" style="width: 30px; height: auto; ">

              <ul class="navbar-nav me-auto">
                  <li class="nav-item"><a class="nav-link text-white" href="index.html">MAGPIE NEST</a></li>
                  </li>
              </ul>
              <ul class="navbar-nav ms-auto">
                  <li class="nav-item"><a class="nav-link text-white" href="about.html">About us</a></li>
                  <li class="nav-item"><a class="nav-link text-white" href="faq.html">Feed</a></li>
                  <li class="nav-item"><a class="nav-link text-white" href="make_trade.html">Trading Room</a></li>
                  <li class="nav-item">
                     
                  </li>
              </ul> 
              <a href="profile.html">
                          <i class="bi bi-person-fill text-white"></i>
                      </a>
          </div>
      </div>
  </nav>

  <div id="app">
    <div class="filtros header" style="margin-top: 24px; position: fixed; width: 100%; z-index: 1000;">
      <div class="row justify-content-end">
        <div class="col-md-3 col-sm-4 selectFILTROS">
          <label for="tamanho" class="CORlableFILTROS">Tamanho:</label>
          <select id="tamanho" class="form-select" v-model="filtroTamanho">
            <option selected value="">Todos</option>
            <option value="35">35</option>
            <option value="35,5">35,5</option>
            <option value="36">36</option>
            <!-- Restante das opções de tamanho -->
          </select>
        </div>
        <div class="col-md-3 col-sm-4 selectFILTROS">
          <label for="marca" class="CORlableFILTROS">Marca:</label>
          <select id="marca" class="form-select" v-model="filtroMarca">
            <option selected value="">Todas</option>
            <option value="Nike">Nike</option>
            <option value="Adidas">Adidas</option>
            <option value="Puma">Puma</option>
            <!-- Restante das opções de marca -->
          </select>
        </div>
        <div class="col-md-3 col-sm-4 selectFILTROS">
          <label for="cor" class="CORlableFILTROS">Cor:</label>
          <select id="cor" class="form-select" v-model="filtroCor">
            <option selected value="">Todas</option>
            <option value="Preto">Preto</option>
            <option value="Branco">Branco</option>
            <option value="Vermelho">Vermelho</option>
            <option value="Azul">Azul</option>
            <!-- Restante das opções de cor -->
          </select>
        </div>
        <div class="col-md-2 col-sm-4">
          <button id="filtrar" class="btn btn-filtrar float-right" @click="aplicarFiltros">Filtrar</button>
        </div>
      </div>
    </div>
  
    <section class="py-5">
      <div class="container px-5 my-5">
        <div class="text-center mb-5" style="margin-top: 100px;">
          <h1 class="fw-bolder">Wanna make a trade?</h1>
          <p class="lead fw-normal text-muted mb-0">CHECK IT OUT WHAT'S NEW</p>
        </div>
        <h2 class="fw-bolder mb-3">Available Trades:
          <button class="btn btn-features float-end" onclick="window.location.href = 'make_trade.html';">Create Trade</button>
        </h2>
        <br>
        <div class="boxtroca" v-for="troca in trocasFiltradas" :key="troca.id">
          <div class="top" style="background-image: url('./images/IMG_4412.png')">
            <div class="profile">
              <div class="circle" :style="`background-image: url(${troca.userHas.SelectedPhotos})`"></div>
              <span class="name">{{ troca.userHas.nome }}</span>
            </div>
          </div>
          <div class="bottom">
            <div class="left">
              <div class="tamanho">{{ troca.userHas.SizeoftheShoe }}</div>
              <div class="marca">{{ troca.userHas.SelectedSneaker }}</div>
            </div>
            <div class="right"></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  
    
    <script src="https://unpkg.com/vue@2.6.14/dist/vue.js"></script>
    <script src="js/scripts.js"></script>

  </main>
  <!-- Footer-->
  <footer class="bg-dark py-0 mt-auto"></footer>
    <div class="mr-4">
        <img src="./images/Footer.jpg" alt="footer Image" style="width:100%; height:auto;">
    </div>
    </footer>
  <!-- Bootstrap core JS-->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
